<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {{
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: linear-gradient(180deg, #fff6ef, #f2ddd1);
        color: #4f271d;
      }}
      article {{
        max-width: 580px;
        text-align: center;
        padding: 28px;
        border-radius: 20px;
        background: rgba(255,255,255,0.74);
        box-shadow: 0 20px 48px rgba(97, 46, 33, 0.12);
      }}
      p {{
        line-height: 1.6;
        color: #7f584a;
      }}
      code {{
        display: inline-block;
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(97, 46, 33, 0.08);
      }}
    </style>
  </head>
  <body>
    <article>
      <h1>Navigation blocked</h1>
      <p>The requested address was rejected by the browser security filter before WebView2 could open it.</p>
      <code>{}</code>
    </article>
  </body>
</html>
